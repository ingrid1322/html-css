<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESAFIO02</title>
    <style>
        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        table { 
            background-color: black;
            border-collapse: separate;
            border: 1px solid rgba(0, 0, 0, 0.507);
            padding: 10px;
            width: 400px;
        }

        td {
            background-color: aqua;
            border: 1px solid rgb(0, 0, 0);
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Desafio 02 - Mesclagem de Células</h1>
    <table>
        <tr>
            <td colspan="4">A</td>
            <td rowspan="4">B</td>
        </tr>
        <tr>
            <td rowspan="4">C</td>
            <td>D</td>
            <td>E</td>
            <td>F</td>
        <tr>
           
            <td>G</td>
            <td>H</td>
            <td>I</td>
        </tr>
        <tr>
            <td>J</td>
            <td>L</td>
            <td>M</td>
        </tr>
        <tr>
            <td colspan="4">N</td>
        </tr>
    </table>
</body>
</html>
