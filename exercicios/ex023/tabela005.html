<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio Tabela</title>
    <style>
        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bolder;
            padding: 8px;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
        }

        tr.destaque {
            background-color: lightsalmon;
        }
    </style>
</head>
<body>
    <h1>Exercicio Tabela</h1>
    <table>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Professao</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Joao Antonio</td>
            <td>M</td>
            <td>30</td>
            <td>Florista</td>
        </tr>
        <tr>
            <td>Igor Souza</td>
            <td>M</td>
            <td>29</td>
            <td>Cabeleleiro</td>
        </tr>
        <tr>
            <td>Ingrid G</td>
            <td>F</td>
            <td>27</td>
            <td>Programadora</td>
        </tr>
        <tr class="destaque">
            <td>Brayan Souza</td>
            <td>M</td>
            <td>8</td>
            <td>Empresario</td>
        </tr>
        <tr>
            <td>Jessica G</td>
            <td>F</td>
            <td>42</td>
            <td>Tecnica de Infermagem</td>
        </tr>
    </table>
</body>
</html>
