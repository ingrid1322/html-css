<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: rgb(62, 93, 187);
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: rgb(108, 146, 2);
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: rgb(43, 226, 83);
        }

        a::active {
            content: ' [link]';
            text-decoration: none;
            font-weight: normal;
            color: brown;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links!</h1>
    <ul>
        <li><a href="https://gustavogunabara.github.io"target="_blank">Repositorio Github</a></li>
        <li><a href="https;//youtube.com/cursoemvideo/"target="_blank">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com"target="_blank">Site do CursoemVideo</a></li>
    </ul>

</body>
</html>
