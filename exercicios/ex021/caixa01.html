<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa</title>
    <style>
        h1 {
            display: inline;
            background-color: lightgray;
            height: 300px;
            width: 300px;
            border-width: 10px;
            border-style: solid;
            border-color: darkslategray;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            margin: 40px auto 40px auto; 

            outline-width: 3px;
            outline-style: dashed;
            outline-color: salmon;
        }

        a {
            display: block;
            border: 10px solid red;
            margin: 40px auto 40px auto;
        }

        p {  
          padding-top: 10px;
          padding-right: 5px;
          padding-bottom: 5px;
          padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa BOX-LEVEL</h1>
    <P>Paragrafos tambem sao exemplos de box-level, mais oa <a href="#">Links sao exemplos de caixa INLINE-LEVEL</a>. Vamos ver como tudo isso funciona.</P>
</body>
</html>
