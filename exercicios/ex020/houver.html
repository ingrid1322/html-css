<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exeplo de Hover</title>
    <STyle>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div > p {
            display: none;
        }

        div:houver > p {
            display: block;
            color: teal;
            background-color: yellowgreen;
            width: 300px;
        }

        div:houver {
            color: tomato;
        }
    </STyle>
</head>
<body>
    <h1>Exeplo de houver</h1>
    <p>passe o mouse sobre o texto abaixo.</p>
    <div>
        Passe o mouse aqui
        <p>Texto Escondido...</p>
    </div>
    <p>FIM DO EXEPLO!</p>

    
</body>
</html>
