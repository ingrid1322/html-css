<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>Tente abrir esse site em varios dispositivos diferentes ou simplestmente almente o tamanho do seu navegador</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/fotop.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/fotom.png" type="image/png">
        <img src="imagens/fotog.png" alt="imagem fluxisivel">
    </picture>

    <h1>Reproduzindo Audio</h1>
    <p>vamos aprender a reproduzir audios em HTML5</p>
    <audio src="midia/midia2.ogg" controls autoplay></audio> <br>
    <audio src="midia/midia1.mp3" controls autoplay></audio>

    <h1>ou vc pode usar outro jeito para colocar audio no seu sait</h1>
    <audio preload="metadata" autoplay controls loop>
        <source src="midia/midia2.mp3" type="audio/mpeg">
        <source src="midia/midia2.ogg" type="audio/ogg">
        <source src="midia/midia2.wav" type="audio/wav">
    </audio>
    
</body>
</html>
